services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=file:./prisma/dev.db
      - JWT_SECRET=${JWT_SECRET:-btp_pro_super_secret_key_2026}
      - CORS_ORIGIN=http://localhost:80
      - UPLOAD_DIR=uploads
      # - SENTRY_DSN=${SENTRY_DSN}
      # - REDIS_URL=${REDIS_URL}
    volumes:
      - btp_uploads:/app/uploads
      - btp_db:/app/prisma
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - btp_net
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - btp_net
    restart: unless-stopped

networks:
  btp_net:
    driver: bridge

volumes:
  btp_uploads:
  btp_db:
