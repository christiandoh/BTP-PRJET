name: CI — BTP.Pro Fullstack

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint Check
        working-directory: frontend
        run: npx eslint src/ --ext .js,.jsx --max-warnings 0 --no-error-on-unmatched-pattern || echo "ESLint not configured yet"

      - name: Backend Build Check
        working-directory: backend
        run: node -e "require('./src/index.js')" &
        env:
          DATABASE_URL: "file:./dev.db"
          JWT_SECRET: "ci_test_secret"
          PORT: 5001

      - name: Frontend Build
        working-directory: frontend
        run: npm run build

      - name: Check Bundle Size
        working-directory: frontend
        run: |
          echo "=== Bundle Size ==="
          du -sh dist/
          ls -lh dist/assets/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Run npm Audit
        working-directory: backend
        run: npm audit --audit-level=high || true

      - name: Run npm Audit Frontend
        working-directory: frontend
        run: npm audit --audit-level=high || true
